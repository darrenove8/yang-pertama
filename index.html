<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spesial Buat Cahya!</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0; 
    padding: 0;
    background-color: #0a0a2a; /* Background gelap biar fotonya menonjol */
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .gallery-item {
    background: white; /* Efek kertas polaroid */
    border-radius: 12px;
    padding: 15px 15px 40px 15px;
    box-shadow: 0 0 20px rgba(238, 0, 255, 0.4);
    width: 260px;
    text-align: center;
  }

  .gallery-item img {
    width: 100%;
    border-radius: 12px;
    display: block;
    margin-bottom: 15px;
    object-fit: cover;
    height: 320px;
    background-color: #ddd;
  }

  .gallery-caption {
    font-style: italic;
    font-weight: bold;
    font-size: 25px;
    color: #333;
  }

  .next-btn {
    background-color: #e7748a;
    border: none;
    color: white;
    font-weight: bold;
    font-style: italic;
    padding: 12px 30px;
    border-radius: 20px;
    cursor: pointer;
    text-decoration: none; /* Menghilangkan garis bawah pada link */
    margin-top: 30px;
    font-size: 18px;
    display: inline-block;
    transition: transform 0.2s;
  }

  .next-btn:hover {
    background-color: #ff8ca1;
    transform: scale(1.05);
  }
</style>
</head>
<body>

  <div class="gallery-item">
    <img src="1.jpg" alt="Foto Spesial">
    
    <div class="gallery-caption">Selamat!</div>
  </div>

  <a href="https://LINK-VERCEL-GAMBAR-KEDUA.vercel.app" class="next-btn">Next ➔</a>

</body>
</html>
